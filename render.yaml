services:
  - type: web
    name: inspec360
    runtime: node
    plan: free
    buildCommand: npm install && npm run build && cd backend && npm install
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: VITE_API_URL
        value: /api
      - key: DATABASE_URL
        fromDatabase:
          name: inspec360-db
          property: connectionString
